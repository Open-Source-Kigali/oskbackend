openapi: 3.0.0
info:
  title: oskbackend API
  version: 1.0.0
  description: |
    Backend API for Open Source Kigali.

    All responses follow a consistent envelope:
      Success: `{ "success": true, "message": string, "data": T }`
      Failure: `{ "success": false, "message": string, "data": null }`
servers:
  - url: /api

tags:
  - name: Health
  - name: Members
  - name: Events
  - name: Partners
  - name: Projects
  - name: Contributors
  - name: Users

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Server is up
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status: { type: string, example: ok }
                          uptime: { type: number }
                          db: { type: string, example: ok }
        "503":
          description: Database unreachable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  uptime:
                    type: number
                  db:
                    type: string
                    example: unreachable
  /members:
    get:
      tags: [Members]
      summary: List all members
      responses:
        "200":
          description: Members retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Member" }
        "500": { $ref: "#/components/responses/InternalError" }
    post:
      tags: [Members]
      summary: Create a member
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MemberInput" }
      responses:
        "201":
          description: Member created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Member" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "500": { $ref: "#/components/responses/InternalError" }

  /members/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Members]
      summary: Get a member by id
      responses:
        "200":
          description: Member retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Member" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
    put:
      tags: [Members]
      summary: Update a member (admin only)
      security:
        - adminApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MemberUpdateInput" }
      responses:
        "200":
          description: Member updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Member" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
    delete:
      tags: [Members]
      summary: Delete a member (admin only)
      security:
        - adminApiKey: []
      responses:
        "204":
          description: Member deleted successfully
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiSuccess" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /events:
    get:
      tags: [Events]
      summary: List all events
      responses:
        "200":
          description: Events retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Event" }
        "500": { $ref: "#/components/responses/InternalError" }
    post:
      tags: [Events]
      summary: Create an event (admin only)
      security:
        - adminApiKey: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/EventInput" }
      responses:
        "201":
          description: Event created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Event" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalError" }

  /events/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Events]
      summary: Get an event by id
      responses:
        "200":
          description: Event retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Event" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
    put:
      tags: [Events]
      summary: Update an event (admin only)
      security:
        - adminApiKey: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/EventUpdateInput" }
      responses:
        "200":
          description: Event updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Event" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
    delete:
      tags: [Events]
      summary: Delete an event (admin only)
      security:
        - adminApiKey: []
      responses:
        "204":
          description: Event deleted successfully
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiSuccess" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /partners:
    get:
      tags: [Partners]
      summary: List all patners
      responses:
        "200":
          description: Partners retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Partner" }
        "500": { $ref: "#/components/responses/InternalError" }
    post:
      tags: [Partners]
      summary: Create a partner
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/PartnerInput" }
      responses:
        "201":
          description: Partner created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Partner" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalError" }

  /partners/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Partners]
      summary: Get a partner by id
      responses:
        "200":
          description: Partner retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Partner" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
    put:
      tags: [Partners]
      summary: Update a partner (admin only)
      security:
        - adminApiKey: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/PartnerUpdateInput" }
      responses:
        "200":
          description: Partner updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Partner" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
    delete:
      tags: [Partners]
      summary: Delete a partner (admin only)
      security:
        - adminApiKey: []
      responses:
        "204":
          description: Partner deleted successfully
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiSuccess" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /projects:
    get:
      tags: [Projects]
      summary: List all projects
      responses:
        "200":
          description: Projects retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Project" }
        "500": { $ref: "#/components/responses/InternalError" }
    post:
      tags: [Projects]
      summary: Create a project (admin only)
      security:
        - adminApiKey: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/ProjectInput" }
      responses:
        "201":
          description: Project created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Project" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalError" }

  /contributors:
    get:
      tags: [Contributors]
      summary: List all contributors from CONTRIBUTORS.md and GitHub
      responses:
        "200":
          description: Contributors retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: {}
        "500": { $ref: "#/components/responses/InternalError" }

  /projects/refresh:
    post:
      tags: [Projects]
      summary: Refresh GitHub-cached filds for all projects (admin only)
      security:
        - adminApiKey: []
      responses:
        "200":
          description: Refresh completed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ProjectRefreshResult"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalError" }

  /projects/{slug}:
    parameters:
      - in: path
        name: slug
        required: true
        schema: { type: string }
    get:
      tags: [Projects]
      summary: Get a project by slug
      responses:
        "200":
          description: Project retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Project" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /projects/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    put:
      tags: [Projects]
      summary: Update a project (admin only)
      security:
        - adminApiKey: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/ProjectUpdateInput" }
      responses:
        "200":
          description: Project updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Project" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
    delete:
      tags: [Projects]
      summary: Delete a project (admin only)
      security:
        - adminApiKey: []
      responses:
        "204":
          description: Project deleted successfully
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiSuccess" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /contributors:
    get:
      tags: [Contributors]
      summary: Read and return contributors.json
      responses:
        "200":
          description: Contributors retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            login: { type: string }
                            name: { type: string }
                            avatarUrl: { type: string }
                            profileUrl: { type: string }
                            bio: { type: string }
                            company: { type: string }
        "500": { $ref: "#/components/responses/InternalError" }

  /contributors/refresh:
    post:
      tags: [Contributors]
      summary: Parse CONTRIBUTORS.md, fetch all GitHub profiles, overwrite contributors.json
      security:
        - adminApiKey: []
      responses:
        "200":
          description: Contributors refreshed successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          totalParsed: { type: number }
                          success: { type: number }
                          failures: { type: number }
                          failedList:
                            type: array
                            items:
                              type: object
                              properties:
                                login: { type: string }
                                error: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalError" }

components:
  securitySchemes:
    adminApiKey:
      type: apiKey
      in: header
      name: x-api-key

  schemas:
    ApiSuccess:
      type: object
      properties:
        success: { type: boolean, example: true }
        message: { type: string }
        data: {}
      required: [success, message, data]

    ApiError:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string }
        data: { type: object, nullable: true, example: null }
      required: [success, message, data]

    Member:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        githubUsername: { type: string }
        orgName: { type: string }
        joinReason: { type: string }
        codingLevel:
          type: string
          enum: [beginner, intermediate, advanced]
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    MemberInput:
      type: object
      required: [name, email, githubUsername, orgName, joinReason, codingLevel]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        githubUsername: { type: string }
        orgName: { type: string }
        joinReason: { type: string }
        codingLevel:
          type: string
          enum: [beginner, intermediate, advanced]

    MemberUpdateInput:
      type: object
      properties:
        name: { type: string }
        email: { type: string, format: email }
        githubUsername: { type: string }
        orgName: { type: string }
        joinReason: { type: string }
        codingLevel:
          type: string
          enum: [beginner, intermediate, advanced]

    Event:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        tagline: { type: string, nullable: true }
        imageUrl: { type: string }
        imagePublicId: { type: string }
        description: { type: string }
        category: { type: string }
        mode: { type: string, example: "in-person" }
        featured: { type: boolean }
        capacity: { type: integer, nullable: true }
        registered: { type: integer, nullable: true }
        date: { type: string, format: date-time }
        endDate: { type: string, format: date-time, nullable: true }
        timeLabel: { type: string, nullable: true }
        location: { type: string }
        speakers:
          type: array
          items: { type: string }
        registerUrl: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    EventInput:
      type: object
      required: [title, file, description, category, date, location]
      properties:
        title: { type: string }
        tagline: { type: string }
        file: { type: string, format: binary, description: "Event image" }
        description: { type: string }
        category: { type: string }
        mode: { type: string, example: "in-person" }
        featured: { type: boolean }
        capacity: { type: integer }
        registered: { type: integer }
        date: { type: string, format: date-time }
        endDate: { type: string, format: date-time }
        timeLabel: { type: string }
        location: { type: string }
        speakers:
          type: string
          description: "JSON array string or comma-separated names"
          example: '["Didas Mbarushimana", "Guest Mentor"]'
        registerUrl: { type: string }

    EventUpdateInput:
      type: object
      properties:
        title: { type: string }
        tagline: { type: string }
        file:
          {
            type: string,
            format: binary,
            description: "Replacement image (optional)",
          }
        description: { type: string }
        category: { type: string }
        mode: { type: string }
        featured: { type: boolean }
        capacity: { type: integer }
        registered: { type: integer }
        date: { type: string, format: date-time }
        endDate: { type: string, format: date-time }
        timeLabel: { type: string }
        location: { type: string }
        speakers:
          { type: string, description: "JSON array string or comma-separated" }
        registerUrl: { type: string }

    Partner:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        websiteUrl: { type: string }
        logoUrl: { type: string }
        logoPublicId: { type: string }
        description: { type: string }
        email: { type: string, format: email }
        partnershipReason: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    PartnerInput:
      type: object
      required: [name, websiteUrl, file, description, email, partnershipReason]
      properties:
        name: { type: string }
        websiteUrl: { type: string }
        file: { type: string, format: binary, description: "Partner logo" }
        description: { type: string }
        email: { type: string, format: email }
        partnershipReason: { type: string }

    PartnerUpdateInput:
      type: object
      properties:
        name: { type: string }
        websiteUrl: { type: string }
        file:
          {
            type: string,
            format: binary,
            description: "Replacement logo (optional)",
          }
        description: { type: string }
        email: { type: string, format: email }
        partnershipReason: { type: string }

    Project:
      type: object
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        repoOwner: { type: string }
        repoName: { type: string }
        imageUrl: { type: string }
        imagePublicId: { type: string }
        tagline: { type: string }
        category: { type: string }
        status: { type: string, enum: [active, archived, paused] }
        featured: { type: boolean }
        maintainer: { type: string, nullable: true }
        langColor: { type: string, nullable: true }
        ghDescription: { type: string, nullable: true }
        ghLanguage: { type: string, nullable: true }
        ghTopics:
          type: array
          items: { type: string }
        ghStars: { type: integer }
        ghForks: { type: integer }
        ghOpenIssues: { type: integer }
        ghContributors: { type: integer }
        ghPullRequests: { type: integer }
        ghPushedAt: { type: string, format: date-time, nullable: true }
        lastFetchedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ProjectInput:
      type: object
      required: [slug, repoOwner, repoName, file, tagline, category]
      properties:
        slug: { type: string }
        repoOwner: { type: string }
        repoName: { type: string }
        file: { type: string, format: binary, description: "Project image" }
        tagline: { type: string }
        category: { type: string }
        status: { type: string, enum: [active, archived, paused] }
        featured: { type: boolean }
        maintainer: { type: string }
        langColor: { type: string }

    ProjectUpdateInput:
      type: object
      properties:
        slug: { type: string }
        repoOwner: { type: string }
        repoName: { type: string }
        file:
          {
            type: string,
            format: binary,
            description: "Replacement image (optional)",
          }
        tagline: { type: string }
        category: { type: string }
        status: { type: string, enum: [active, archived, paused] }
        featured: { type: boolean }
        maintainer: { type: string }
        langColor: { type: string }

    ProjectRefreshResult:
      type: object
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        ok: { type: boolean }
        error: { type: string, nullable: true }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [ADMIN, USER] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

  responses:
    BadRequest:
      description: Invalid input
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
    Forbidden:
      description: Admin access required
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
    NotFound:
